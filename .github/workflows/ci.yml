# CI Pipeline — Runs on every pull request to main/staging/production.
# Executes linting, unit tests, integration tests, and container builds
# for all 4 workloads (frontend, backend, ai-services, workers).
name: CI Pipeline

on:
  pull_request:
    branches: [main, staging, production]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  PYTHON_VERSION: "3.11"
  AWS_REGION: eu-west-1

jobs:
  lint-backend:
    name: Lint — Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: backend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: backend
      - run: pnpm lint
        working-directory: backend

  lint-frontend:
    name: Lint — Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: frontend
      - run: pnpm lint
        working-directory: frontend

  lint-workers:
    name: Lint — Workers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: workers/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: workers
      - run: pnpm lint
        working-directory: workers

  lint-ai-services:
    name: Lint — AI Services
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: uv sync
        working-directory: ai-services
      - run: uv run ruff check .
        working-directory: ai-services

  test-backend:
    name: Test — Backend
    runs-on: ubuntu-latest
    needs: lint-backend
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: backend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: backend
      - run: pnpm test
        working-directory: backend
      - run: pnpm test:e2e
        working-directory: backend

  test-frontend:
    name: Test — Frontend
    runs-on: ubuntu-latest
    needs: lint-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: frontend
      - run: pnpm test
        working-directory: frontend

  test-ai-services:
    name: Test — AI Services
    runs-on: ubuntu-latest
    needs: lint-ai-services
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: uv sync
        working-directory: ai-services
      - run: uv run pytest
        working-directory: ai-services

  test-workers:
    name: Test — Workers
    runs-on: ubuntu-latest
    needs: lint-workers
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: workers/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: workers
      - run: pnpm test
        working-directory: workers

  build-images:
    name: Build & Scan Container Images
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend, test-ai-services, test-workers]
    strategy:
      matrix:
        service: [frontend, backend, ai-services, workers]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          push: false
          tags: korefield-academy/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: korefield-academy/${{ matrix.service }}:${{ github.sha }}
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH

  terraform-plan:
    name: Terraform Plan Review
    runs-on: ubuntu-latest
    if: contains(github.event.pull_request.labels.*.name, 'infrastructure') || contains(join(github.event.pull_request.changed_files, ' '), 'infrastructure/')
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: Terraform Init
        run: terraform init
        working-directory: infrastructure
      - name: Terraform Plan
        run: terraform plan -var-file=envs/dev.tfvars -no-color
        working-directory: infrastructure
