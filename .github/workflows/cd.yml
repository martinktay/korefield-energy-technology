# CD Pipeline — Auto-deploys to dev on merge to main.
# Staging and production require explicit approval gates.
# Uses ECS Fargate zero-downtime rolling deployments with automated rollback.
name: CD Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      target_environment:
        description: "Target environment for deployment"
        required: true
        type: choice
        options:
          - staging
          - production

env:
  AWS_REGION: eu-west-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.eu-west-1.amazonaws.com

permissions:
  id-token: write
  contents: read

jobs:
  build:
    name: Build Artifacts
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [frontend, backend, ai-services, workers]
    outputs:
      image_tag: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: aws-actions/amazon-ecr-login@v2
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/korefield-${{ matrix.service }}:${{ github.sha }}
            ${{ env.ECR_REGISTRY }}/korefield-${{ matrix.service }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-dev:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'
    environment: dev
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: hashicorp/setup-terraform@v3
      - name: Terraform Apply — Dev
        working-directory: infrastructure
        run: |
          terraform init
          terraform apply -var-file=envs/dev.tfvars -auto-approve
      - name: Update ECS Services
        run: |
          for service in frontend backend ai-services workers; do
            aws ecs update-service \
              --cluster korefield-academy-dev-cluster \
              --service korefield-academy-dev-${service} \
              --force-new-deployment
          done
      - name: Wait for stable deployment
        run: |
          for service in frontend backend ai-services workers; do
            aws ecs wait services-stable \
              --cluster korefield-academy-dev-cluster \
              --services korefield-academy-dev-${service}
          done

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build, deploy-dev]
    if: github.event.inputs.target_environment == 'staging' || github.event.inputs.target_environment == 'production'
    environment:
      name: staging
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: hashicorp/setup-terraform@v3
      - name: Terraform Plan — Staging
        working-directory: infrastructure
        run: |
          terraform init
          terraform plan -var-file=envs/staging.tfvars -no-color
      - name: Terraform Apply — Staging
        working-directory: infrastructure
        run: terraform apply -var-file=envs/staging.tfvars -auto-approve
      - name: Update ECS Services
        run: |
          for service in frontend backend ai-services workers; do
            aws ecs update-service \
              --cluster korefield-academy-staging-cluster \
              --service korefield-academy-staging-${service} \
              --force-new-deployment
          done
      - name: Wait for stable deployment
        run: |
          for service in frontend backend ai-services workers; do
            aws ecs wait services-stable \
              --cluster korefield-academy-staging-cluster \
              --services korefield-academy-staging-${service}
          done

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.event.inputs.target_environment == 'production'
    environment:
      name: production
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: hashicorp/setup-terraform@v3
      - name: Terraform Plan — Production
        working-directory: infrastructure
        run: |
          terraform init
          terraform plan -var-file=envs/production.tfvars -no-color
      - name: Terraform Apply — Production
        working-directory: infrastructure
        run: terraform apply -var-file=envs/production.tfvars -auto-approve
      - name: Zero-downtime ECS deployment
        run: |
          for service in frontend backend ai-services workers; do
            aws ecs update-service \
              --cluster korefield-academy-production-cluster \
              --service korefield-academy-production-${service} \
              --force-new-deployment \
              --deployment-configuration "minimumHealthyPercent=100,maximumPercent=200"
          done
      - name: Wait for stable deployment
        run: |
          for service in frontend backend ai-services workers; do
            aws ecs wait services-stable \
              --cluster korefield-academy-production-cluster \
              --services korefield-academy-production-${service}
          done
      - name: Rollback on failure
        if: failure()
        run: |
          echo "Deployment failed — ECS circuit breaker will auto-rollback"
          echo "Check CloudWatch for details"
